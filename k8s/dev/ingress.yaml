apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customer-portal-ingress
  namespace: dev
spec:
  ingressClassName: nginx
  rules:
  - host: dev.app.ravndclsn.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: customer-portal-service
            port:
              number: 80
